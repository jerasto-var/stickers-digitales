<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Sticker Designer v14</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --accent: #6366f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { width: 100%; max-width: 480px; background: var(--card); padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .preview { background: #e2e8f0; background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); background-size: 20px 20px; border-radius: 20px; margin-bottom: 25px; min-height: 320px; display: flex; align-items: center; justify-content: center; border: 1px solid #cbd5e1; }
        .controls { display: flex; flex-direction: column; gap: 15px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input { padding: 14px; border-radius: 15px; border: 2px solid #e2e8f0; font-size: 16px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.2s; }
        button:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="app">
    <div class="preview" id="preview"></div>
    <div class="controls">
        <div class="group">
            <label>Texto del Sticker</label>
            <input type="text" id="nameInp" placeholder="Nombre..." maxlength="15" value="IVÁN">
        </div>
        <button onclick="download()">Descargar SVG Final</button>
    </div>
</div>

<script>
    const nameInp = document.getElementById('nameInp');
    const preview = document.getElementById('preview');
    const colorsRainbow = ['#ef4444', '#f59e0b', '#facc15', '#22c55e', '#3b82f6', '#8b5cf6'];

    function getCharWeight(char) {
        if (['I', '1', 'Í'].includes(char)) return 0.38;
        if (['M', 'W'].includes(char)) return 1.1;
        return 0.85;
    }

    function getSVG() {
        const nameText = nameInp.value.toUpperCase().trim() || "PAZ";
        const systemFonts = "'Montserrat', 'Arial Black', sans-serif";
        const letters = nameText.split('');
        const n = letters.length;
        
        const svgW = 550; // Un poco más ancho para los nuevos adornos
        const svgH = 340;
        const centerX = svgW / 2;
        
        const fontSize = n > 8 ? 42 : 48;
        const radius = 900 + (n * 35);
        const centerY = radius + 95; 

        const baseTightnessFactor = Math.max(0.032, 0.044 - (n * 0.0011)); 
        const charWeights = letters.map(getCharWeight);
        const totalAngle = charWeights.reduce((a, b) => a + b, 0) * baseTightnessFactor;
        const startAngle = -(totalAngle / 2) - Math.PI/2;

        const defs = `
            <defs>
                <filter id="stickerShadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                    <feOffset dx="0" dy="4" result="offsetBlur"/>
                    <feFlood flood-color="black" flood-opacity="0.2"/>
                    <feComposite in2="offsetBlur" operator="in" result="shadow"/>
                    <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
                </filter>
                <linearGradient id="yellowOrangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#facc15"/>
                    <stop offset="100%" stop-color="#f59e0b"/>
                </linearGradient>
            </defs>
        `;

        let content = "";
        const layers = [
            { stroke: 'black', width: 11, fill: 'none' },
            { stroke: 'none', width: 0, fill: 'auto' }
        ];

        layers.forEach(layer => {
            content += `<g>`;
            let currentAngle = startAngle;
            letters.forEach((char, i) => {
                const charWeight = charWeights[i];
                const angle = currentAngle + ( (charWeight * baseTightnessFactor) / 2 );
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                const rotation = (angle + Math.PI/2) * (180 / Math.PI);
                const fillColor = layer.fill === 'auto' ? colorsRainbow[i % colorsRainbow.length] : layer.fill;
                
                content += `
                    <text x="${x}" y="${y}" transform="rotate(${rotation}, ${x}, ${y})"
                          fill="${fillColor}" stroke="${layer.stroke}" stroke-width="${layer.width}" stroke-linejoin="round"
                          style="font-family:${systemFonts}; font-weight:900; font-size:${fontSize}px; text-anchor:middle; dominant-baseline:middle;">
                        ${char}
                    </text>`;
                currentAngle += (charWeight * baseTightnessFactor);
            });
            content += `</g>`;
        });

        // ARCO SÚPER ANCHO
        const arcWidth = (totalAngle * 180) + 125; 
        const arcY = 150; 
        const arcPath = `M ${centerX - arcWidth} ${arcY} Q ${centerX} ${arcY - 15} ${centerX + arcWidth} ${arcY}`;

        const drawStar = (x, y, size, rotate = 0) => {
            const s = size;
            return `<polygon points="${x},${y-s} ${x+s*0.25},${y-s*0.25} ${x+s},${y-s*0.25} ${x+s*0.4},${y+s*0.25} ${x+s*0.6},${y+s} ${x},${y+s*0.5} ${x-s*0.6},${y+s} ${x-s*0.4},${y+s*0.25} ${x-s},${y-s*0.25} ${x-s*0.25},${y-s*0.25}" 
                     fill="#facc15" stroke="black" stroke-width="1.2" stroke-linejoin="round" transform="rotate(${rotate}, ${x}, ${y})" />`;
        };

        // NUEVO: LAZO ABIERTO (FILIGRANA BÉZIER)
        const drawOpenLoop = (x, y, isRight = false) => {
            const scaleX = isRight ? 1 : -1;
            return `<g transform="translate(${x}, ${y}) scale(${scaleX}, 1)">
                <path d="M 0 0 C 15 -10, 35 5, 25 20 C 18 30, 5 25, 8 12" 
                      fill="none" stroke="black" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="15" cy="-12" r="3" fill="#facc15" stroke="black" stroke-width="1"/>
            </g>`;
        };

        const decorations = `
            <path d="${arcPath}" fill="none" stroke="url(#yellowOrangeGrad)" stroke-width="8" stroke-linecap="round" />
            
            ${drawOpenLoop(centerX - arcWidth, arcY - 5)}
            ${drawOpenLoop(centerX + arcWidth, arcY - 5, true)}

            ${drawStar(centerX - arcWidth - 35, arcY - 22, 6.5, -15)} 
            ${drawStar(centerX - arcWidth - 45, arcY - 32, 3.8, -10)}
            ${drawStar(centerX + arcWidth + 35, arcY - 22, 6.5, 15)}
            ${drawStar(centerX + arcWidth + 45, arcY - 32, 3.8, 10)}
        `;

        return `
            <svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" filter="url(#stickerShadow)">
                ${defs}
                ${content}
                ${decorations}
            </svg>
        `.trim();
    }

    function update() { preview.innerHTML = getSVG(); }
    function download() {
        const blob = new Blob([getSVG()], {type: "image/svg+xml;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `${nameInp.value || 'sticker'}.svg`;
        a.click();
    }

    nameInp.addEventListener('input', update);
    update();
</script>

</body>
</html>
