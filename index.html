<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Bubble Sticker Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --accent: #ff9f43;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            color: #333;
            opacity: 0.8;
        }

        .preview-box {
            width: 100%;
            background: #eee;
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 20px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            min-height: 250px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .btn-download {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 16px 25px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }

        .btn-download:active {
            transform: scale(0.98);
        }

        svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SVG Sticker Maker v2</h1>
    
    <div class="preview-box" id="svgContainer">
        </div>

    <div class="input-group">
        <input type="text" id="nombre" placeholder="Tu nombre aquí..." maxlength="12" value="IVÁN">
    </div>

    <button class="btn-download" id="downloadBtn">Descargar SVG Sticker</button>
</div>

<script>
    const inputNombre = document.getElementById('nombre');
    const container = document.getElementById('svgContainer');
    const downloadBtn = document.getElementById('downloadBtn');

    // Paleta de colores para las letras, inspirada en la imagen de muestra
    const colors = ["#ff9f43", "#ffcd57", "#1dd1a1", "#2e86de", "#8b5cf6", "#e17055"];

    function generateSVGString() {
        const textoIn = inputNombre.value || "PAZ";
        const totalLetters = textoIn.length;
        
        // --- Lógica avanzada de espaciado y arcos ---
        // Ajustamos los pesos de cada letra para el kerning inteligente
        const letterWidths = textoIn.split('').map(char => {
            if (char === 'I' || char === 'Í' || char === 'l' || char === '1') return 0.6; // Estrechas
            if (char === 'M' || char === 'W' || char === 'MÍ') return 1.1; // Anchas
            return 0.8; // Estándar
        });
        
        // Factor de espaciado base (ligeramente separado)
        const separationFactor = 1.6;
        
        // Multiplicador de longitud del adorno (mucho más largo que la palabra)
        const pedestalLengthMultiplier = Math.max(1.5, 2.0 / (totalLetters / 10)); // Mínimo 1.5, proporcional

        // Definiciones de filtros y gradientes
        const defs = `
            <defs>
                <filter id="stickerShadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                    <feOffset dx="0" dy="5" result="offsetBlur"/>
                    <feFlood flood-color="black" flood-opacity="0.3"/>
                    <feComposite in2="offsetBlur" operator="in" result="shadow"/>
                    <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
                </filter>
                <linearGradient id="bubbleHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
                    <stop offset="30%" stop-color="white" stop-opacity="0"/>
                </linearGradient>
            </defs>
        `;

        // Generación de capas de texto (Contorno blanco -> Color -> Sombra interior -> Brillo)
        let lettersGroup = `<g id="letras" filter="url(#stickerShadow)">`;
        
        const totalWidth = letterWidths.reduce((a, b) => a + b, 0) * 60; // Ancho estimado total
        const startX = (500 - totalWidth) / 2;

        let currentX = startX;
        for (let i = 0; i < totalLetters; i++) {
            const letter = textoIn[i].toUpperCase();
            const color = colors[i % colors.length];
            
            const w = letterWidths[i] * 60;
            const x = currentX + (w / 2); // Posición centrada para el text-anchor:middle
            
            // Unificamos el posicionamiento de cada letra en capas
            lettersGroup += `
                <g id="letra_${i}" transform="translate(${x} 80)">
                    <text x="0" y="0" class="txt" fill="white" stroke="white" stroke-width="24" stroke-linejoin="round">${letter}</text>
                    <text x="0" y="0" class="txt" fill="none" stroke="#222" stroke-width="12" stroke-linejoin="round">${letter}</text>
                    <text x="0" y="0" class="txt" fill="${color}">${letter}</text>
                    <text x="0" y="0" class="txt" fill="url(#bubbleHighlight)" style="opacity: 0.35;">${letter}</text>
                </g>
            `;
            
            // Avanzamos currentX según el ancho de la letra y el factor de separación
            currentX += w * separationFactor;
        }
        lettersGroup += `</g>`;

        // Composición final
        // Adorno naranja mucho más largo y decoraciones
        const finalW = Math.max(500, (currentX + totalWidth / 2) * pedestalLengthMultiplier);
        
        // Decoraciones (pedestal y filigrana)
        const pedestalArcW = finalW * 0.75; // Ancho del arco naranja
        
        return `
            <svg id="exportedSvg" width="${finalW}" height="280" viewBox="0 0 ${finalW} 280" xmlns="http://www.w3.org/2000/svg">
                ${defs}
                <style>
                    .txt { font-family: 'Luckiest Guy', cursive; font-size: 70px; text-anchor: middle; dominant-baseline: middle; }
                </style>
                
                ${lettersGroup}
                
                <g id="adorno" transform="translate(${finalW / 2} 180)">
                    <path d="M ${-pedestalArcW/2} 0 Q 0 40 ${pedestalArcW/2} 0" fill="none" stroke="#ff9f43" stroke-width="12" stroke-linecap="round" />
                    
                    <g transform="translate(${-pedestalArcW/2 - 30} -10) scale(-1 1)">
                        <path d="M 0 0 C 10 -15 30 10 20 25 C 10 40 -10 15 0 0 Z" fill="none" stroke="#222" stroke-width="2.5" />
                        <circle cx="20" cy="-20" r="3" fill="#ffd13e" />
                    </g>
                    
                    <g transform="translate(${pedestalArcW/2 + 30} -10)">
                        <path d="M 0 0 C 10 -15 30 10 20 25 C 10 40 -10 15 0 0 Z" fill="none" stroke="#222" stroke-width="2.5" />
                        <circle cx="20" cy="-20" r="3" fill="#222" style="opacity: 0.5;" />
                    </g>
                </g>
            </svg>
        `.trim();
    }

    function updatePreview() {
        container.innerHTML = generateSVGString();
    }

    function downloadSVG() {
        const svgData = generateSVGString();
        const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${inputNombre.value || 'sticker'}.svg`;
        link.click();
        URL.revokeObjectURL(url);
    }

    inputNombre.addEventListener('input', updatePreview);
    downloadBtn.addEventListener('click', downloadSVG);

    // Inicializar
    updatePreview();
</script>

</body>
</html>
