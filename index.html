<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Bubble Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4757; --bg: #f1f2f6; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { width: 100%; max-width: 450px; background: var(--card); padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .preview { background: #eee; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; border-radius: 20px; margin-bottom: 20px; min-height: 250px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .controls { display: flex; flex-direction: column; gap: 12px; }
        input, select { padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; outline: none; }
        .row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 8px 15px; border-radius: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        svg { filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
    </style>
</head>
<body>

<div class="app">
    <div class="preview" id="preview"></div>
    
    <div class="controls">
        <input type="text" id="nameInp" placeholder="Nombre..." maxlength="12" value="MATÍAS">
        
        <div class="row">
            <span>Color</span>
            <input type="color" id="colorInp" value="#ff4757">
        </div>

        <select id="styleInp">
            <option value="balloon">Efecto Globo (Sticker)</option>
            <option value="outline">Contorno Simple</option>
        </select>

        <button onclick="download()">Descargar SVG</button>
    </div>
</div>

<script>
    const nameInp = document.getElementById('nameInp');
    const colorInp = document.getElementById('colorInp');
    const styleInp = document.getElementById('styleInp');
    const preview = document.getElementById('preview');

    function getSVG() {
        const name = nameInp.value.toUpperCase() || "NOMBRE";
        const color = colorInp.value;
        const isBalloon = styleInp.value === 'balloon';

        // Definición de filtros para el efecto "Globo"
        const defs = `
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="2" result="blur"/>
                    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
            </defs>
        `;

        let content = "";

        if (isBalloon) {
            // EFECTO GLOBO (Capas de trazo redondeado)
            content = `
                <text x="50%" y="45%" class="txt" fill="white" stroke="white" stroke-width="22" stroke-linejoin="round">${name}</text>
                <text x="50%" y="45%" class="txt" fill="none" stroke="#333" stroke-width="12" stroke-linejoin="round">${name}</text>
                <text x="50%" y="45%" class="txt" fill="${color}">${name}</text>
                <text x="50%" y="43%" class="txt" fill="white" style="opacity: 0.3; font-size: 65px;">${name}</text>
                
                <path d="M 150 135 Q 250 155 350 135" fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" />
                <circle cx="120" cy="110" r="4" fill="${color}" />
                <circle cx="380" cy="100" r="3" fill="#ffd32a" />
                <path d="M 110 130 Q 100 140 110 150" fill="none" stroke="#333" stroke-width="3" />
            `;
        } else {
            // CONTORNO SIMPLE (Tu idea original)
            content = `
                <text x="50%" y="50%" class="txt" fill="none" stroke="${color}" stroke-width="14">${name}</text>
                <text x="50%" y="50%" class="txt" fill="none" stroke="white" stroke-width="7">${name}</text>
                <text x="50%" y="50%" class="txt" fill="${color}">${name}</text>
            `;
        }

        return `
            <svg id="svgOut" width="500" height="250" viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg">
                ${defs}
                <style>
                    .txt { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 70px; text-anchor: middle; dominant-baseline: middle; }
                </style>
                ${content}
            </svg>
        `.trim();
    }

    function update() { preview.innerHTML = getSVG(); }

    function download() {
        const svgData = getSVG();
        const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${nameInp.value || 'logo'}.svg`;
        a.click();
    }

    [nameInp, colorInp, styleInp].forEach(el => el.addEventListener('input', update));
    update();
</script>

</body>
</html>
