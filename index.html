<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Stickers Arcoíris</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #333; --bg: #f4f6f8; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { width: 100%; max-width: 480px; background: var(--card); padding: 25px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .preview { background: #eee; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; border-radius: 20px; margin-bottom: 25px; min-height: 280px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .controls { display: flex; flex-direction: column; gap: 15px; }
        input { padding: 15px; border-radius: 12px; border: 2px solid #ddd; font-size: 18px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #2e86de; }
        button { background: #ff4757; color: white; border: none; padding: 18px; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 18px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        svg { filter: drop-shadow(0 8px 15px rgba(0,0,0,0.15)); }
    </style>
</head>
<body>

<div class="app">
    <div class="preview" id="preview"></div>
    
    <div class="controls">
        <input type="text" id="nameInp" placeholder="Nombre..." maxlength="12" value="PAZ">
        <button onclick="download()">Descargar SVG</button>
    </div>
</div>

<script>
    const nameInp = document.getElementById('nameInp');
    const preview = document.getElementById('preview');

    // Paleta arcoíris vibrante para el relleno de letras y partículas
    const colorsRainbow = ['#ff3e3e', '#ff9f43', '#feca57', '#1dd1a1', '#2e86de', '#9c88ff'];

    function getSVG() {
        const nameText = nameInp.value.toUpperCase() || "PAZ";
        const numLetters = nameText.length;
        const numColors = colorsRainbow.length;

        // Definiciones técnicas (Curvas y Gradientes)
        const defs = `
            <defs>
                <path id="textPathCurve" d="M 100 120 Q 250 80 400 120" />

                <radialGradient id="balloonGlow" cx="50%" cy="40%" r="50%" fx="50%" fy="30%">
                    <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
                    <stop offset="60%" stop-color="white" stop-opacity="0.1"/>
                    <stop offset="100%" stop-color="white" stop-opacity="0"/>
                </radialGradient>

                <linearGradient id="rainbowArco" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ff3e3e"/>
                    <stop offset="25%" stop-color="#ff9f43"/>
                    <stop offset="50%" stop-color="#feca57"/>
                    <stop offset="75%" stop-color="#1dd1a1"/>
                    <stop offset="100%" stop-color="#2e86de"/>
                </linearGradient>
            </defs>
        `;

        // Generación dinámica de capas de texto (Contorno -> Relleno -> Brillo)
        let lettersGroup = `<g id="letras">`;
        let particlesGroup = `<g id="partículas">`;

        // El ancho de las letras debe ser proporcional para centrar el textPath.
        // Calculamos una separación estimada para las partículas.
        const startX = 120;
        const totalW = 260; 
        const separation = totalW / (numLetters > 1 ? numLetters - 1 : 1);

        // CAPA 1: Contorno Negro Redondeado (Base del sticker)
        // Usamos textPath para que siga la curva.
        lettersGroup += `
            <text class="txt-base" fill="none" stroke="black" stroke-width="22" stroke-linejoin="round" letter-spacing="3">
                <textPath href="#textPathCurve" startOffset="50%" text-anchor="middle">${nameText}</textPath>
            </text>
        `;

        // CAPA 2: Relleno Arcoíris (Letra por Letra)
        // Como textPath no permite colorear letras individuales fácilmente, 
        // simulamos la alineación con texto normal para las capas superiores.
        for (let i = 0; i < numLetters; i++) {
            const letter = nameText[i];
            const color = colorsRainbow[i % numColors];
            
            // X posición de la letra (aproximada para alineación normal)
            const x = startX + (i * 35) + 30; // Posición centrada

            // Relleno de color (texto normal alineado por JavaScript)
            lettersGroup += `<text x="${x}" y="38%" class="txt-solid" fill="${color}">${letter}</text>`;
            
            // Partículas/Estrellitas: alineadas y alternadas
            const isTop = i % 2 === 0;
            const cyParticle = isTop ? 120 : 135; // Separadas y más abajo
            const cxParticle = x; 
            particlesGroup += `<circle cx="${cxParticle}" cy="${cyParticle}" r="4" fill="${color}" style="opacity: 0.8;" />`;
        }
        
        // CAPA 3: Gradiente de Volumen (Tu idea del brillo)
        // Usamos el texto normal encima de las letras sólidas
        for (let i = 0; i < numLetters; i++) {
            const letter = nameText[i];
            const x = startX + (i * 35) + 30; 
            lettersGroup += `<text x="${x}" y="38%" class="txt-solid" fill="url(#balloonGlow)">${letter}</text>`;
        }

        // Cerrar grupos
        lettersGroup += `</g>`;
        particlesGroup += `</g>`;

        // Composición final
        return `
            <svg id="svgOut" width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
                ${defs}
                <style>
                    .txt-base { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 75px; }
                    .txt-solid { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 75px; text-anchor: middle; dominant-baseline: middle; }
                </style>
                
                ${lettersGroup}
                
                <path d="M 120 180 Q 250 205 380 180" fill="none" stroke="url(#rainbowArco)" stroke-width="12" stroke-linecap="round" />
                
                ${particlesGroup}
            </svg>
        `.trim();
    }

    function update() { preview.innerHTML = getSVG(); }

    function download() {
        const svgData = getSVG();
        const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${nameInp.value || 'logo'}.svg`;
        a.click();
    }

    nameInp.addEventListener('input', update);
    update();
</script>

</body>
</html>
