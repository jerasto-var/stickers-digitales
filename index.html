<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Sticker Designer v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { width: 100%; max-width: 450px; background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .preview { background: #f1f5f9; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; border-radius: 20px; margin-bottom: 25px; min-height: 280px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .controls { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 16px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 18px; outline: none; text-align: center; }
        button { background: #6366f1; color: white; border: none; padding: 18px; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.2s; }
        button:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>

<div class="app">
    <div class="preview" id="preview"></div>
    <div class="controls">
        <input type="text" id="nameInp" placeholder="Nombre..." maxlength="15" value="PAZ">
        <button onclick="download()">Descargar SVG</button>
    </div>
</div>

<script>
    const nameInp = document.getElementById('nameInp');
    const preview = document.getElementById('preview');
    const colorsRainbow = ['#ef4444', '#f59e0b', '#facc15', '#22c55e', '#3b82f6', '#8b5cf6'];

    function getSVG() {
        const nameText = nameInp.value.toUpperCase() || "PAZ";
        const letters = nameText.split('');
        const numLetters = letters.length;
        
        // Configuración de dimensiones
        const svgW = 500;
        const svgH = 300;
        const centerX = svgW / 2;
        const centerY = 250; // Centro imaginario para el arco (abajo)
        const radius = 160;  // Radio de la curva
        const fontSize = 55;
        const letterSpacing = 0.35; // En radianes

        const defs = `
            <defs>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                    <feOffset dx="0" dy="4" result="offsetBlur"/>
                    <feFlood flood-color="black" flood-opacity="0.2"/>
                    <feComposite in2="offsetBlur" operator="in" result="shadow"/>
                    <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
                </filter>
                <radialGradient id="glow" cx="50%" cy="35%" r="50%">
                    <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
                    <stop offset="60%" stop-color="white" stop-opacity="0.1"/>
                    <stop offset="100%" stop-color="white" stop-opacity="0"/>
                </radialGradient>
                <linearGradient id="rainbowLine" x1="0%" y1="0%" x2="100%" y2="0%">
                    ${colorsRainbow.map((c, i) => `<stop offset="${(i/(colorsRainbow.length-1))*100}%" stop-color="${c}"/>`).join('')}
                </linearGradient>
            </defs>
        `;

        let content = "";
        const startAngle = -( (numLetters - 1) * letterSpacing ) / 2 - Math.PI/2;

        // Capas: 1. Contornos (fondo), 2. Colores, 3. Brillo
        const layers = [
            { type: 'contour', stroke: 'black', width: 12, fill: 'none' },
            { type: 'color', stroke: 'none', width: 0, fill: 'auto' },
            { type: 'glow', stroke: 'none', width: 0, fill: 'url(#glow)' }
        ];

        layers.forEach(layer => {
            content += `<g>`;
            letters.forEach((char, i) => {
                const angle = startAngle + (i * letterSpacing);
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                const rotation = (angle + Math.PI/2) * (180 / Math.PI);
                
                const fillColor = layer.fill === 'auto' ? colorsRainbow[i % colorsRainbow.length] : layer.fill;
                
                content += `
                    <text x="${x}" y="${y}" 
                          transform="rotate(${rotation}, ${x}, ${y})"
                          fill="${fillColor}" 
                          stroke="${layer.stroke}" 
                          stroke-width="${layer.width}" 
                          stroke-linejoin="round"
                          style="font-family:'Montserrat', sans-serif; font-weight:900; font-size:${fontSize}px; text-anchor:middle; dominant-baseline:middle;">
                        ${char}
                    </text>`;
            });
            content += `</g>`;
        });

        // Arco decorativo proporcional
        const arcSpread = (numLetters * 25) + 40;
        const arcY = 165;
        const arcPath = `M ${centerX - arcSpread} ${arcY} Q ${centerX} ${arcY + 25} ${centerX + arcSpread} ${arcY}`;

        return `
            <svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" filter="url(#shadow)">
                ${defs}
                ${content}
                <path d="${arcPath}" fill="none" stroke="url(#rainbowLine)" stroke-width="8" stroke-linecap="round" />
            </svg>
        `.trim();
    }

    function update() { preview.innerHTML = getSVG(); }
    function download() {
        const blob = new Blob([getSVG()], {type: "image/svg+xml;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `${nameInp.value || 'sticker'}.svg`;
        a.click();
    }

    nameInp.addEventListener('input', update);
    update();
</script>

</body>
</html>
