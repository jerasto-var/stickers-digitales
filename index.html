<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Sticker Maker PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #333; --bg: #f4f6f8; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app { width: 100%; max-width: 450px; background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .preview { background: #eee; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; border-radius: 20px; margin-bottom: 25px; min-height: 250px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .controls { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 15px; border-radius: 12px; border: 2px solid #ddd; font-size: 18px; outline: none; }
        button { background: #ff4757; color: white; border: none; padding: 18px; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 18px; }
        button:active { transform: scale(0.98); }
        svg { filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
    </style>
</head>
<body>

<div class="app">
    <div class="preview" id="preview"></div>
    
    <div class="controls">
        <input type="text" id="nameInp" placeholder="Escribe un nombre..." maxlength="12" value="PAZ">
        <button onclick="download()">Descargar SVG</button>
    </div>
</div>

<script>
    const nameInp = document.getElementById('nameInp');
    const preview = document.getElementById('preview');

    // Paleta de colores arcoíris para letras y partículas
    const colorsRainbow = ['#ff4757', '#ff9f43', '#feca57', '#1dd1a1', '#2e86de', '#574b90'];

    function getSVG() {
        const nameText = nameInp.value.toUpperCase() || "PAZ";
        const letters = nameText.split('');
        const numLetters = letters.length;
        const numColors = colorsRainbow.length;

        // Definiciones técnicas (Sombras, Gradientes y Brillo 3D)
        const defs = `
            <defs>
                <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                    <feOffset dx="0" dy="5" result="offsetBlur"/>
                    <feFlood flood-color="black" flood-opacity="0.3"/>
                    <feComposite in2="offsetBlur" operator="in" result="shadow"/>
                    <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
                </filter>
                
                <linearGradient id="rainbowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ff4757"/>
                    <stop offset="20%" stop-color="#ff9f43"/>
                    <stop offset="40%" stop-color="#feca57"/>
                    <stop offset="60%" stop-color="#1dd1a1"/>
                    <stop offset="80%" stop-color="#2e86de"/>
                    <stop offset="100%" stop-color="#574b90"/>
                </linearGradient>

                <radialGradient id="balloonGlow" cx="50%" cy="40%" r="50%" fx="50%" fy="30%">
                    <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
                    <stop offset="50%" stop-color="white" stop-opacity="0.2"/>
                    <stop offset="100%" stop-color="white" stop-opacity="0"/>
                </radialGradient>
            </defs>
        `;

        // Lógica de alineación: Calculamos el centro y X base para alinear capas perfectamente
        const widthText = numLetters * 65; // Separación estimada de letras
        const startX = (500 - widthText) / 2;

        // Creación dinámica de capas letra por letra
        let contourGroup = ``;
        let solidGroup = ``;
        let glowGroup = ``;
        let particlesGroup = `<g id="partículas">`;

        for (let i = 0; i < numLetters; i++) {
            const letter = letters[i];
            const color = colorsRainbow[i % numColors];
            
            // X posición alineada con precisión (el punto de control mecatrónico)
            const x = startX + (i * 65) + 30; // Posición centrada

            // 1. Capa Base: Contorno negro redondeado (crea el efecto 'burbuja' o 'sticker')
            // Se dibuja primero para estar en el fondo.
            contourGroup += `<text x="${x}" y="38%" class="txt" fill="none" stroke="black" stroke-width="26" stroke-linejoin="round">${letter}</text>`;
            
            // 2. Capa Intermedia: Letra sólida de color (Arcoíris)
            solidGroup += `<text x="${x}" y="38%" class="txt" fill="${color}">${letter}</text>`;

            // 3. Capa Superior: Brillo 3D (para dar volumen de globo)
            glowGroup += `<text x="${x}" y="38%" class="txt" fill="url(#balloonGlow)">${letter}</text>`;

            // Partículas/Estrellitas secuenciales más abajo y alineadas
            const isTop = i % 2 === 0;
            const cyParticle = isTop ? 100 : 120; // Alternadas para naturalidad
            particlesGroup += `<circle cx="${x}" cy="${cyParticle}" r="4" fill="${color}" style="opacity: 0.8;" />`;
        }
        
        particlesGroup += `</g>`;

        // Cálculo dinámico del arco inferior PROPORCIONAL a la longitud
        const arcBaseWidth = Math.max(100, widthText + 50); // Mínimo 100, ajustado al texto
        const arcXStart = (500 - arcBaseWidth) / 2;
        const arcXEnd = 500 - arcXStart;
        const arcY = 160; // Posición vertical del arco
        const arcCurveHeight = arcY + 25; // Altura de la curva (más abajo)

        // Composición final: Contornos -> Sólidos -> Brillo -> Adornos
        return `
            <svg id="svgOut" width="500" height="250" viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg" filter="url(#dropShadow)">
                ${defs}
                <style>
                    .txt { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 75px; text-anchor: middle; dominant-baseline: middle; }
                </style>
                
                ${contourGroup}
                ${solidGroup}
                ${glowGroup}
                
                <path d="M ${arcXStart} ${arcY} Q 250 ${arcCurveHeight} ${arcXEnd} ${arcY}" fill="none" stroke="url(#rainbowGrad)" stroke-width="12" stroke-linecap="round" />
                
                ${particlesGroup}
            </svg>
        `.trim();
    }

    function update() { preview.innerHTML = getSVG(); }

    function download() {
        const svgData = getSVG();
        const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${nameInp.value || 'logo'}.svg`;
        a.click();
    }

    nameInp.addEventListener('input', update);
    update();
</script>

</body>
</html>
